<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Live Parser</title>

    <!-- GitHub Markdown CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css">

    <!-- KaTeX (client-side math rendering) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

    <!-- Editor UI styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Client-side rendering libraries -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<body>
    <header>
        <span class="logo">Markdown Parser</span>
        <span class="mermaid-group">
            <label id="mermaid-native-label">
                <input type="checkbox" id="mermaid-native" checked> Mermaid (native)
            </label>
            <label id="mermaid-js-label">
                <input type="checkbox" id="mermaid-js"> Mermaid (mermaid.js)
            </label>
        </span>
        <label id="math-toggle-label">
            <input type="checkbox" id="math-toggle" checked> Math
        </label>
        <span id="status" class="status loading">Loading WASM...</span>
    </header>

    <main>
        <div class="pane" id="editor-pane">
            <div class="pane-header">Markdown</div>
            <textarea id="editor" spellcheck="false" placeholder="Type markdown here..."></textarea>
        </div>

        <div class="divider"></div>

        <div class="pane" id="preview-pane">
            <div class="pane-header">Preview</div>
            <div id="preview" class="markdown-body"></div>
        </div>
    </main>

    <script src="dist/markdown_parser.js"></script>
    <script>
        const editor         = document.getElementById('editor');
        const preview        = document.getElementById('preview');
        const status         = document.getElementById('status');
        const mermaidNative  = document.getElementById('mermaid-native');
        const mermaidJs      = document.getElementById('mermaid-js');
        const mathToggle     = document.getElementById('math-toggle');

        if (window.mermaid) {
            mermaid.initialize({ startOnLoad: false });
        }

        Module.onRuntimeInitialized = () => {
            status.textContent = 'Ready';
            status.className = 'status ready';
            render();
        };

        // Selection rules between the two mermaid engines:
        //   - Native selected      → mermaid.js can be added as a *fallback*.
        //   - mermaid.js selected  → native cannot be selected (it is locked).
        function syncMermaidControls() {
            const jsPrimary = mermaidJs.checked && !mermaidNative.checked;
            mermaidNative.disabled = jsPrimary;
        }

        // The fenced-code handler group passed to the WASM parser.
        //   native on              → "mermaid"   (server-side SVG; mermaid.js,
        //                                         if also on, renders any
        //                                         fallback <div class="mermaid">)
        //   native off, js on      → "mermaidjs" (pure client-side passthrough)
        function mermaidFlag() {
            if (mermaidNative.checked) return 'mermaid';
            if (mermaidJs.checked)     return 'mermaidjs';
            return null;
        }

        function activeFlags() {
            const flags = [];
            const mflag = mermaidFlag();
            if (mflag)              flags.push(mflag);
            if (mathToggle.checked) flags.push('math');
            return flags.join(',');
        }

        function render() {
            syncMermaidControls();

            const md    = editor.value;
            const flags = activeFlags();

            let html;
            if (flags.length > 0 && typeof Module.parseMarkdownWithFlags === 'function') {
                html = Module.parseMarkdownWithFlags(md, flags);
            } else if (typeof Module.parseMarkdown === 'function') {
                html = Module.parseMarkdown(md);
            } else {
                return;
            }

            preview.innerHTML = html;

            renderMermaidJs();
            renderMath();
        }

        // Run mermaid.js over any raw-source <div class="mermaid"> blocks. This
        // covers both pure mermaid.js mode and the native-fallback case (native
        // emits raw source into a mermaid div when its own parser fails). Blocks
        // the native renderer already turned into <svg> are skipped.
        function renderMermaidJs() {
            if (!mermaidJs.checked || !window.mermaid) return;
            const nodes = Array.from(preview.querySelectorAll('div.mermaid'))
                .filter(el => !el.querySelector('svg') && !el.dataset.processed);
            if (nodes.length === 0) return;
            try {
                mermaid.run({ nodes });
            } catch (e) {
                /* leave the raw source in place on failure */
            }
        }

        // Render <div class="math"> blocks with KaTeX.
        function renderMath() {
            if (!window.katex) return;
            preview.querySelectorAll('div.math').forEach(el => {
                const tex = el.textContent;
                try {
                    katex.render(tex, el, { displayMode: true, throwOnError: false });
                } catch (e) {
                    /* leave the raw source in place on failure */
                }
            });
        }

        editor.addEventListener('input', render);
        mermaidNative.addEventListener('change', render);
        mermaidJs.addEventListener('change', render);
        mathToggle.addEventListener('change', render);

        // Default content shown on load
        editor.value = [
            '# Welcome to Markdown Parser',
            '',
            'Type on the left, see the result on the right.',
            '',
            '## Features',
            '',
            '- **Bold** and *italic* text',
            '- `inline code` and fenced code blocks',
            '- [Links](https://example.com)',
            '- Blockquotes, lists, and more',
            '',
            '```js',
            'console.log("Hello, world!");',
            '```',
            '',
            '## Mermaid Diagram',
            '',
            '```mermaid',
            'graph TB',
            '    A[Start] --> B{Is it working?}',
            '    B -- Yes --> C[Great!]',
            '    B -- No  --> D[Debug]',
            '    D --> A',
            '```',
            '',
            '## Math',
            '',
            '```math',
            'E = mc^2',
            '```',
        ].join('\n');
    </script>
</body>
</html>
