name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: run CTest with a native build ─────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build -L spec --output-on-failure

  # ── Job 2: rebuild WASM and commit to web/dist ───────────────────────────
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: test          # only runs if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Configure (WASM)
        run: emcmake cmake -B build-wasm

      - name: Build (WASM)
        run: cmake --build build-wasm --parallel

      - name: Commit web/dist
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/dist/markdown_parser.js web/dist/markdown_parser.wasm
          git diff --cached --quiet || git commit -m "chore: rebuild WASM [skip ci]"
          git push
